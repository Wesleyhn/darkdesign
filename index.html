<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Dark Design</title>
        <meta name="description" content="A assinatura de design que impulsionará o crescimento dos seus negócios.">

        <link rel="stylesheet" type="text/css" href="css/style.css" />
        <link rel="icon" type="image/x-icon" href="./favicon.svg" />
        <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@900&family=Poppins:wght@400;600&family=Roboto:wght@400;500&display=swap" rel="stylesheet">

        <script src="./js/Gradient.js"></script>
    </head>

    <body>
        <header class="header-bg">
            <div class="header container">
                <a href="./"><img src="./img/logo/Logo.svg" alt=""></a>

                <nav aria-label="primaria">
                    <ul class="header-menu font-1-m cor-0">
                        <li><a href="">Benefícios</a></li>
                        <li><a href="">Trabalhos</a></li>
                        <li><a href="">FAQ</a></li>
                    </ul>
                </nav>

            </div>
        </header>
        
        <main class="introducao-bg">
            <canvas id="gradient-canvas"></canvas>
            <div class="introducao container">
                <p class="font-1-m-b cor-p2">Bem vindo(a) a Darkdesign.</p>
                <h1 class="font-1-xxl">Solicite, acompanhe e desfrute de designs exclusivos<span class="cor-p2">.</span></h1>
                <p class="font-1-m cor-4">A assinatura de design que impulsionará o crescimento dos seus negócios.</p>
            </div>
        </main>

        <style>
            #gradient-canvas {
                --gradient-color-1: #111111;
                --gradient-color-2: #ccff00;
                --gradient-color-3: #718D00;
                --gradient-color-4: #191F00;
            }
        </style>
        <script>
            var gradient = new Gradient();
            gradient.initGradient("#gradient-canvas");
        </script>
    </body>
</html>
