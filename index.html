<!doctype html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />

        <title>Dark Design</title>
        <meta name="description" content="A assinatura de design que impulsionará o crescimento dos seus negócios.">

        <link rel="stylesheet" type="text/css" href="css/style.css" />
        <link rel="icon" type="image/x-icon" href="./favicon.svg" />

    <body>
        <canvas id="gradient-canvas"> </canvas>
        <header>

                <img src="./img/logo/DARK-2.svg" />

                <p class="font-1-xs">Aguarde...</p>

        <style>
            #gradient-canvas {
                --gradient-color-1: #000000;
                --gradient-color-2: #ccff00;
                --gradient-color-3: #e7ff8a;
                --gradient-color-4: #303030;
            }
        </style>
        <script>
            var gradient = new Gradient();
            gradient.initGradient("#gradient-canvas");
        </script>
